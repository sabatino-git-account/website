# Docs: https://github.com/azure/functions-action

name: Deploy contact API to Azure Function App

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/azure-function.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: sabatino-contact-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F18733011DA64340A35F175304CC01BE }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DA58A3D4D7B54447B74453BAE8A03D10 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D81DFCCFDC884B98BE66FC665EE65BB5 }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Build function package
        working-directory: api
        run: npm ci --omit=dev

      - name: Zip package
        run: cd api && zip -r ../function.zip . -x "*.git*"

      - name: Deploy to Azure Functions
        run: |
          RG=$(az functionapp list \
            --query "[?name=='${{ env.AZURE_FUNCTIONAPP_NAME }}'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ]; then
            echo "Function app not found: ${{ env.AZURE_FUNCTIONAPP_NAME }}"
            exit 1
          fi
          az functionapp deployment source config-zip \
            --resource-group "$RG" \
            --name "${{ env.AZURE_FUNCTIONAPP_NAME }}" \
            --src function.zip
